name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.23', '1.25']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install C compiler (required for CGO/sqlite-vec)
        run: sudo apt-get install -y gcc

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Build
        run: CGO_ENABLED=1 go build -tags sqlite_fts5 ./...

      - name: Vet
        run: CGO_ENABLED=1 go vet -tags sqlite_fts5 ./...

      - name: Unit Tests
        run: CGO_ENABLED=1 gotestsum --junitfile junit/unit.xml -- -tags sqlite_fts5 ./... -v

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-go${{ matrix.go-version }}
          path: junit/*.xml

  report:
    runs-on: ubuntu-latest
    needs: [test]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download All Test Results
        uses: actions/download-artifact@v4
        with:
          path: test-results
          merge-multiple: true

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: test-results/**/*.xml
          reporter: java-junit

